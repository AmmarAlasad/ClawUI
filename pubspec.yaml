name: claw_ui
description: Mobile control surface for OpenClaw.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  flutter_chat_ui: ^2.11.1
  flutter_chat_core: ^2.9.0
  gpt_markdown: ^1.1.5
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  mime: ^2.0.0
  flutter_local_notifications: ^21.0.0
  flutter_background_service: ^5.1.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
